[flake8]
max-line-length = 100
extend-exclude = .eggs,.git,.mypy_cache,.tox,.venv,build,dist,alembic/versions,__pycache__
ignore = E203,EIM001
enable-extensions = EIM002
max-cognitive-complexity = 15
per-file-ignores =
    # Test fixtures use optional params/raises not in function signatures
    tests/**/*.py:DAR101,DAR201,DAR301,DAR401,E501,PF001,PF002
    tests\**\*.py:DAR101,DAR201,DAR301,DAR401,E501,PF001,PF002
    # flake8-pydantic false positives - SQLAlchemy ORM models use mapped_column
    # with server_default and no default, which PF001/PF002/PF003 warn about
    src/messaging/infrastructure/persistence/outbox_orm.py:PF001,PF002,PF003
    src/messaging\infrastructure\persistence\outbox_orm.py:PF001,PF002,PF003
    src/messaging/infrastructure/persistence/processed_message_orm.py:PF001,PF002,PF003
    src/messaging\infrastructure\persistence\processed_message_orm.py:PF001,PF002,PF003
    src/messaging/infrastructure/persistence/orm_models/*.py:PF001,PF002,PF003
    src/messaging\infrastructure\persistence\orm_models\*.py:PF001,PF002,PF003
    # Protocol class with class-level abstract declarations uses PF syntax
    src/messaging/infrastructure/pubsub/kafka/kafka_dead_letter_handler/handler_mixin.py:PF001,PF002,DAR102,DAR103
    src/messaging\infrastructure\pubsub\kafka\kafka_dead_letter_handler\handler_mixin.py:PF001,PF002,DAR102,DAR103
    # DAR402: exceptions propagate through called functions (not directly raised)
    # but are documented for API consumers
    src/messaging/infrastructure/pubsub/consumer_base/consumer_consume.py:DAR402
    src/messaging\infrastructure\pubsub\consumer_base\consumer_consume.py:DAR402
    # DAR103: optional parameters flagged; behaviorally correct
    src/messaging/infrastructure/pubsub/kafka/kafka_dead_letter_handler/execution.py:DAR103
    src/messaging\infrastructure\pubsub\kafka\kafka_dead_letter_handler\execution.py:DAR103
    src/messaging/infrastructure/pubsub/kafka/kafka_dead_letter_handler/handler.py:DAR102,DAR103
    src/messaging\infrastructure\pubsub\kafka\kafka_dead_letter_handler\handler.py:DAR102,DAR103
    src/messaging/infrastructure/pubsub/kafka/kafka_dead_letter_handler/helpers.py:DAR103
    src/messaging\infrastructure\pubsub\kafka\kafka_dead_letter_handler\helpers.py:DAR103

[darglint]
docstring_style = google
strictness = short
