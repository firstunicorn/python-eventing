[flake8]
max-line-length = 100
extend-exclude = .eggs,.git,.mypy_cache,.tox,.venv,build,dist,alembic/versions,__pycache__
# W292: Blank line at EOF is auto-fixed by pre-commit (ruff-format), causes commit loop
ignore = E203,EIM001,W292
enable-extensions = EIM002
max-cognitive-complexity = 15
per-file-ignores =
    # LINTER EXCLUSIONS FOR TESTS: Tests use different documentation standards
    # DAR101/DAR201/DAR301/DAR401: pytest fixtures use implicit params (from decorator/pytest magic)
    # E501: Test code readability > line length (long assertion messages, test data)
    # PF001/PF002: Test fixtures may use Pydantic models with various field styles
    # CCR001: Test complexity is acceptable (tests are inherently sequential/conditional)
    tests/*.py:DAR101,DAR201,DAR301,DAR401,E501,PF001,PF002,CCR001
    tests\*.py:DAR101,DAR201,DAR301,DAR401,E501,PF001,PF002,CCR001
    tests/**/*.py:DAR101,DAR201,DAR301,DAR401,E501,PF001,PF002,CCR001
    tests\**\*.py:DAR101,DAR201,DAR301,DAR401,E501,PF001,PF002,CCR001
    # LINTER EXCLUSIONS FOR SQLALCHEMY ORM: False positives from flake8-pydantic
    # PF001/PF002/PF003: SQLAlchemy's mapped_column(default=...) is NOT Pydantic Field()
    # RATIONALE: flake8-pydantic plugin incorrectly flags SQLAlchemy Mapped[] columns as Pydantic
    #            field violations. mapped_column() uses SQLAlchemy's column default system, which
    #            is fundamentally different from Pydantic's Field(default=...) system.
    # DECISION: Suppress PF* checks for all ORM model files rather than disable plugin globally
    src/messaging/infrastructure/kafka_dlq/orm_models.py:PF001,PF002,PF003
    src/messaging\infrastructure\kafka_dlq\orm_models.py:PF001,PF002,PF003
    src/messaging/infrastructure/persistence/outbox_orm.py:PF001,PF002,PF003
    src/messaging\infrastructure\persistence\outbox_orm.py:PF001,PF002,PF003
    src/messaging/infrastructure/persistence/processed_message_orm.py:PF001,PF002,PF003
    src/messaging\infrastructure\persistence\processed_message_orm.py:PF001,PF002,PF003
    src/messaging/infrastructure/persistence/orm_models/*.py:PF001,PF002,PF003
    src/messaging\infrastructure\persistence\orm_models\*.py:PF001,PF002,PF003
    # Protocol class with class-level abstract declarations uses PF syntax
    src/messaging/infrastructure/pubsub/kafka/kafka_dead_letter_handler/handler_mixin.py:PF001,PF002,DAR102,DAR103
    src/messaging\infrastructure\pubsub\kafka\kafka_dead_letter_handler\handler_mixin.py:PF001,PF002,DAR102,DAR103
    # DAR402: exceptions propagate through called functions (not directly raised)
    # but are documented for API consumers
    src/messaging/infrastructure/pubsub/consumer_base/consumer_consume.py:DAR402
    src/messaging\infrastructure\pubsub\consumer_base\consumer_consume.py:DAR402
    # DAR103: optional parameters flagged; behaviorally correct
    src/messaging/infrastructure/pubsub/kafka/kafka_dead_letter_handler/execution.py:DAR103
    src/messaging\infrastructure\pubsub\kafka\kafka_dead_letter_handler\execution.py:DAR103
    src/messaging/infrastructure/pubsub/kafka/kafka_dead_letter_handler/handler.py:DAR102,DAR103
    src/messaging\infrastructure\pubsub\kafka\kafka_dead_letter_handler\handler.py:DAR102,DAR103
    src/messaging/infrastructure/pubsub/kafka/kafka_dead_letter_handler/helpers.py:DAR103
    src/messaging\infrastructure\pubsub\kafka\kafka_dead_letter_handler\helpers.py:DAR103
    # PT011/B011/B017: chaos tests test unknown aiokafka error types after broker restart
    tests/chaos/**/*.py:B017,PT011
    tests\chaos\**\*.py:B017,PT011
    # PT011/B017: property tests check for any validation error from multiple sources
    tests/property_based/core/test_event_contract_validation.py:B017,PT011
    tests\property_based\core\test_event_contract_validation.py:B017,PT011
    # PT011: both None values produce same error message; exact match not worth splitting
    tests/unit/infrastructure/test_consumer_helpers.py:PT011
    tests\unit\infrastructure\test_consumer_helpers.py:PT011

[darglint]
docstring_style = google
strictness = short
