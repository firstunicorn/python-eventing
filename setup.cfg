[flake8]
max-line-length = 100
extend-exclude = .eggs,.git,.mypy_cache,.tox,.venv,build,dist,alembic/versions,__pycache__
ignore = E203,EIM001
enable-extensions = EIM002
max-cognitive-complexity = 15
per-file-ignores =
    tests/**/*.py:DAR101,DAR201,DAR301,DAR401,E501,PF001,PF002
    src/eventing/infrastructure/persistence/outbox_orm.py:PF001,PF002,PF003
    src/eventing/infrastructure/persistence/processed_message_orm.py:PF001,PF002,PF003

[darglint]
docstring_style = google
strictness = short
