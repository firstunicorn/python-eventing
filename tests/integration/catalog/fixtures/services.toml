# Service Registry
# This file lives in the centralized event-catalog repository (one per organization)
# Example: https://github.com/your-org/event-catalog.git
#
# The 'repository' field below points to each SERVICE'S SOURCE CODE repository,
# NOT to this event-catalog repository. This is metadata for documentation/discovery.
#
# Common scenarios:
# - Monorepo: Multiple services can share the same repository URL
# - Polyrepo: Each service has its own repository URL

[services.order-service]
team = "commerce"
contact = "team@example.com"
# Points to the SOURCE CODE repo of this microservice (for developers to find the code)
repository = "https://github.com/org/backend-monorepo"
events_published = ["orders.order.created"]
events_consumed = []
